# Resource plan for 6-core / 8GB host, ~5 concurrent users:
#   OS/Docker headroom ~1GB | db ~1.5GB | odoo ~5GB | nginx ~128MB
services:
  db:
    image: postgres:16
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    # Light Postgres tuning for 8GB host / few users
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=50
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    volumes:
      - odoo_db_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # No internet: only on the internal network
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1536M
        reservations:
          cpus: "0.50"
          memory: 512M

  odoo:
    image: odoo:19
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./addons:/mnt/extra-addons
    restart: unless-stopped
    # No internet: only on the internal network
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "4.00"
          memory: 5G
        reservations:
          cpus: "1.00"
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    container_name: odoo_nginx
    depends_on:
      - odoo
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped
    # frontend: publish ports; internal: proxy to odoo
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  certbot:
    profiles: ["https"]
    image: certbot/certbot:latest
    container_name: odoo_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    # Needs outbound access for Let's Encrypt renewals
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M

networks:
  # No default gateway — db and odoo cannot reach the internet
  internal:
    driver: bridge
    internal: true
  # nginx / certbot only
  frontend:
    driver: bridge

volumes:
  odoo_db_data:
  odoo_data:
