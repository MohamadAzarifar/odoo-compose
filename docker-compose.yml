# docker-compose.yml
version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: odoo_db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo_db_data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odoo_network
    # Memory limits optimized for 8GB total
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Odoo Application
  odoo:
    image: odoo:${ODOO_VERSION}
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069" # Main web interface
      - "8072:8072" # Longpolling/Websockets
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - odoo_network
    # Memory limits - Odoo gets the majority of RAM
    deploy:
      resources:
        limits:
          memory: 4.5G
        reservations:
          memory: 2G

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: odoo_nginx
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - odoo_data:/var/lib/odoo
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - odoo_network
    # Nginx is lightweight
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # SSL Certificate Management (Optional - for production)
  certbot:
    image: certbot/certbot:latest
    container_name: odoo_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - odoo_network
    restart: unless-stopped

networks:
  odoo_network:
    driver: bridge

volumes:
  odoo_db_data:
  odoo_data:
