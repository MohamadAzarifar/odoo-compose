# Squid allowlist proxy: Odoo reaches only domains listed in proxy/allowlist.txt
# Resource plan for 6-core / 8GB: OS ~1GB | db 1.5GB | odoo 5GB | nginx 128MB | squid 128MB
services:
  db:
    image: postgres:16
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=50
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    volumes:
      - odoo_db_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # No internet — internal network only
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1536M
        reservations:
          cpus: "0.50"
          memory: 512M

  proxy:
    image: ubuntu/squid:latest
    container_name: odoo_proxy
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./proxy/allowlist.txt:/etc/squid/allowlist.txt:ro
    restart: unless-stopped
    # Speaks to Odoo on internal; reaches allowlisted hosts via frontend
    networks:
      - internal
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  odoo:
    image: odoo:19
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
      proxy:
        condition: service_started
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # Outbound only via Squid allowlist (no direct internet)
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128
      http_proxy: http://proxy:3128
      https_proxy: http://proxy:3128
      NO_PROXY: db,proxy,nginx,localhost,127.0.0.1
      no_proxy: db,proxy,nginx,localhost,127.0.0.1
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./personal_addons:/mnt/personal-addons
    restart: unless-stopped
    # No direct internet — internal only; egress via proxy service
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "4.00"
          memory: 5G
        reservations:
          cpus: "1.00"
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    container_name: odoo_nginx
    depends_on:
      - odoo
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  certbot:
    profiles: ["https"]
    image: certbot/certbot:latest
    container_name: odoo_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M

networks:
  # No default gateway — db/odoo cannot reach the internet directly
  internal:
    driver: bridge
    internal: true
  # nginx, certbot, and squid egress
  frontend:
    driver: bridge

volumes:
  odoo_db_data:
  odoo_data:
