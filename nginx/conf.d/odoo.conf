# nginx/conf.d/odoo.conf
upstream odoo {
    server odoo:8069;
}

upstream odoo_longpolling {
    server odoo:8072;
}

# Redirect HTTP to HTTPS (Uncomment for SSL)
server {
    listen 80;
    server_name 79.132.192.98;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server (for production with SSL)
server {
    listen 443 ssl http2;
    server_name 79.132.192.98;

    # SSL Configuration (Uncomment when you have certificates)
    # ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Proxy Settings
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Proxy Headers
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;

    # Main Odoo Requests
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Longpolling (Websockets)
    location /longpolling/ {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Odoo Static Files - Caching
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
    }

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_types text/css text/javascript application/javascript application/json application/xml text/plain;
    gzip_min_length 1000;
    gzip_proxied any;
    
    # Limit Request Size (Prevent DOS)
    client_max_body_size 100M;
}