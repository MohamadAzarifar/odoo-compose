# Squid — allowlisted egress for Odoo only.
# Destinations must appear in /etc/squid/allowlist.txt (one domain per line).
# Leading-dot entries (e.g. .odoo.com) match that domain and all subdomains.

http_port 3128

visible_hostname odoo_proxy
coredump_dir /var/spool/squid

# Do not cache proxied traffic
cache deny all

# Ports Odoo may CONNECT to (HTTPS + common SMTP submission)
acl SSL_ports port 443
acl SSL_ports port 465
acl SSL_ports port 587
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 465
acl Safe_ports port 587
acl CONNECT method CONNECT

acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow CONNECT allowed_domains
http_access allow allowed_domains
http_access deny all

access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
