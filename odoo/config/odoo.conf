# odoo/config/odoo.conf
[options]
# Paths
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

# Database
db_host = db
db_port = 5432
db_user = odoo
db_password = ${POSTGRES_PASSWORD}
admin_passwd = ${ODOO_ADMIN_PASSWD}

# Worker Configuration (Formula: (CPU cores * 2) + 1 = 9 workers)
# But we limit to 4-5 for safety with 8GB RAM
workers = 5
limit_memory_hard = 2684354560  # 2.5 GB
limit_memory_soft = 2147483648  # 2.0 GB
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
max_cron_threads = 2

# Proxy Settings (MUST be True when using Nginx)
proxy_mode = True
x_forwarded_host = True

# Security
list_db = True

# Logging
log_level = info
logfile = /var/log/odoo/odoo.log
logrotate = True

# Performance
db_maxconn = 64
dbfilter = ^%d$
http_enable = True
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072

# Email
email_from = False
smtp_server = localhost
smtp_port = 25
smtp_ssl = False